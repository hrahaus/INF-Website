<style>
  /* Header – pastelliges Grün */
  .site-header { background-color: #d8f3dc !important; border-top: none !important; }
  
  /* Nav links – dunkelgrün damit sie lesbar sind */
  .site-title, .site-title:visited, .site-nav .page-link { color: #2d6a4f !important; }
  .site-nav .page-link:hover { color: #1b4332 !important; }
  
  /* Links auf den Seiten */
  a { color: #2d6a4f !important; }
  
  /* Footer – schmaller und pastellig */
  .site-footer { 
    background-color: #d8f3dc !important; 
    color: #2d6a4f !important; 
    border-top: 1px solid #b7e4c7 !important;
    padding: 10px 0 !important;  /* schmaller */
  }
  .site-footer .footer-col-wrapper { display: none !important; }
</style>

<header class="site-header">
  <div class="wrapper" style="display: flex; align-items: center; justify-content: space-between;">
    
    <!-- Logo + Title -->
    <a class="site-title" href="/" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
      <img src="{{ '/assets/csm_Logo_middle_972559cf42.webp' | relative_url }}" alt="TRR Wiki Logo" height="35">
      <span>TRR Wiki</span>
    </a>
    
    <!-- Navigation -->
    <nav class="site-nav">
      {% for path in site.header_pages %}
        {% assign my_page = site.pages | where: "path", path | first %}
        {% if my_page.title %}
          <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>

  </div>
</header>
</a>
