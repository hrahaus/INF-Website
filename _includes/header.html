<header class="site-header">
  <div class="wrapper" style="display: flex; align-items: center; justify-content: space-between;">
    
    <!-- Logo + Title -->
    <a class="site-title" href="/" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
      <img src="{{ '/assets/logo.svg' | relative_url }}" alt="TRR Wiki Logo" height="35">
      <span>TRR Wiki</span>
    </a>

    <!-- Navigation -->
    <nav class="site-nav">
      {% for path in site.header_pages %}
        {% assign my_page = site.pages | where: "path", path | first %}
        {% if my_page.title %}
          <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>

  </div>
</header>
