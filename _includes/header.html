<style>
  /* Header */
  .site-header { background-color: #95d5b2 !important; border-top: none !important; }
  
  /* Nav links – schwarz */
  .site-title, .site-title:visited, .site-nav .page-link { color: #000000 !important; }
  .site-nav .page-link:hover { color: #1b4332 !important; }
  
  /* Links auf den Seiten – schwarz */
  a { color: #000000 !important; }
  
  /* Footer */
  .site-footer { 
    background-color: #95d5b2 !important; 
    color: #000000 !important; 
    border-top: 1px solid #74c69d !important;
    padding: 10px 0 !important;
  }
  .site-footer .footer-col-wrapper { display: none !important; }
</style>

<header class="site-header">
  <div class="wrapper" style="display: flex; align-items: center; justify-content: space-between;">
    
    <!-- Logo + Title -->
    <a class="site-title" href="/" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
      <img src="{{ '/assets/csm_Logo_middle_972559cf42.webp' | relative_url }}" alt="TRR Wiki Logo" height="35">
      <span>TRR Wiki</span>
    </a>
    
    <!-- Navigation -->
    <nav class="site-nav">
      {% for path in site.header_pages %}
        {% assign my_page = site.pages | where: "path", path | first %}
        {% if my_page.title %}
          <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title }}</a>
        {% endif %}
      {% endfor %}
    </nav>

  </div>
</header>
</a>
